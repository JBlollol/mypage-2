<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link rel="stylesheet" href="../css/signup.css">
  <script src="../js/signup.js" defer></script>
</head>
<body>
  <div class="signup-container">
    <h2>회원가입</h2>
    <form id="signupForm" action="./login.html">
      <!-- 이름 -->
      <label for="name">이름</label>
      <input type="text" id="name" name="name" required>

      <!-- 아이디 -->
      <label for="userid">아이디</label>
      <input type="text" id="userid" name="userid" required>

      <!-- 비밀번호 -->
      <label for="password">비밀번호</label>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" required>
        <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
      </div>

      <!-- 비밀번호 확인 -->
      <label for="confirmPassword">비밀번호 확인</label>
      <div class="password-wrapper">
        <input type="password" id="confirmPassword" name="confirmPassword" required>
        <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
      </div>

      <!-- 닉네임 -->
      <label for="nickname">닉네임</label>
      <input type="text" id="nickname" name="nickname" required>

      <!-- 핸드폰번호 -->
      <label for="phone">핸드폰번호</label>
      <input type="tel" id="phone" name="phone" required>

      <!-- 주소 -->
      <label for="address">주소</label>
      <input type="text" id="address" name="address" required>

      <!-- 약관 동의 -->
      <div class="terms">
        <label><input type="checkbox" id="agreeAll"> 전체 동의</label>
        <label><input type="checkbox" class="agree" required> 개인정보 처리방침 동의 (필수)</label>
        <label><input type="checkbox" class="agree" required> 서비스 이용약관 동의 (필수)</label>
        <label><input type="checkbox" class="agree" required> 개인정보 수집 동의 (필수)</label>
      </div>

      <!-- 제출 버튼 -->
      <button type="submit">회원가입</button>
    </form>
  </div>
</body>
</html>
